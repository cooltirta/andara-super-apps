<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andara Super Apps - Pendataan Jamaah Pengajian</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- CSS Stylesheet -->
    <link rel="stylesheet" href="/static/css/styles.css">
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- App Container -->
    <div id="app-container" class="login-layout">
        <!-- Sidebar Navigation (Ditampilkan dinamis setelah login) -->
        <aside id="sidebar" class="sidebar hidden">
            <div class="sidebar-header">
                <div class="logo-container">
                    <div class="logo-icon">A</div>
                    <h2>Andara Super Apps</h2>
                </div>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav-links">
                <!-- Navigasi diisi dinamis berdasarkan role -->
            </nav>
            <div class="sidebar-footer">
                <div class="user-profile-summary">
                    <img id="user-avatar" src="https://lh3.googleusercontent.com/a/default-user=s96-c" alt="Avatar" class="avatar">
                    <div class="user-details">
                        <span id="user-name" class="user-name">Nama Pengguna</span>
                        <span id="user-role-badge" class="badge">Member</span>
                    </div>
                </div>
                <button id="btn-logout" class="btn-logout">
                    <i data-lucide="log-out"></i>
                    <span>Keluar</span>
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main id="main-content" class="main-content">
            <!-- View aktif akan dirender di sini secara dinamis -->
            <div id="loading-spinner" class="spinner-overlay hidden">
                <div class="spinner"></div>
            </div>
        </main>
    </div>

    <!-- Notification Container (Toasts) -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Main JavaScript Module -->
    <script type="module" src="/static/js/app.js"></script>
</body>
</html>
